<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema db_romero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">DB Romero</span>
    </div>
    <nav>
      <p class="nav-label">Tablas</p>
      <button class="nav-btn active" data-tabla="accion">Acción</button>
      <button class="nav-btn" data-tabla="accion_especifica">Acción Específica</button>
      <button class="nav-btn" data-tabla="actividad">Actividad</button>
      <button class="nav-btn" data-tabla="subaccion">Subacción</button>
      <button class="nav-btn" data-tabla="tipo_agente">Tipo Agente</button>
      <button class="nav-btn" data-tabla="tipo_transporte">Tipo Transporte</button>
      <button class="nav-btn" data-tabla="zona_distrito">Zona Distrito</button>
      <button class="nav-btn" data-tabla="zona_provincia">Zona Provincia</button>
      <button class="nav-btn" data-tabla="detalle_registro">Detalle Registro</button>
    </nav>
    <div class="sidebar-footer">
      <span class="status-dot"></span> Conectado
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="tabla-titulo">Acción</h1>
        <p class="tabla-sub" id="tabla-sub">Gestión de registros</p>
      </div>
      <button class="btn-nuevo" id="btn-nuevo">+ Nuevo</button>
    </header>

    <!-- Buscador -->
    <div class="search-bar">
      <input type="text" id="buscador" placeholder="Buscar en la tabla..." />
    </div>

    <!-- Tabla -->
    <div class="table-wrap">
      <table id="tabla-principal">
        <thead id="tabla-head"></thead>
        <tbody id="tabla-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none">
        <span>No hay registros</span>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-titulo">Nuevo registro</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <form id="modal-form"></form>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btn-cancel">Cancelar</button>
        <button class="btn-save" id="btn-save">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
